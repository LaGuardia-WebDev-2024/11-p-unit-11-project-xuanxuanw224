<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Fav movies n stuff</title>
    <link href="style.css" rel="stylesheet" type="text/css" />

 <link rel="icon" type="image/x-icon" href="https://preview.redd.it/anyone-got-a-high-quality-image-of-the-sdn-logo-v0-pidhmr97w99g1.png?width=2000&format=png&auto=webp&s=f69672999b5bbdd9983c3d060be41a024256804b">
  </head>
  <body>
<center>
 
    
    <button id="mem1-button">Character #1</button>
    <button id="mem2-button">Character #2</button>
    <button id="mem3-button">Character #3</button>
    <h1>meowmeowmeow</h1>
    <p>Event though I like all of em... ALL OF THEM...</p>
    <ol>
      <li>
        <h3 id="mem1">Character #1</h3>
        <p>"Tis but a scratch" after two explosions, and also sleeps in a chair.</p>
        <img class="Robert border" src="https://i.redd.it/ub5kpmollgyf1.jpeg", width="500">
      </li>

      <li>
        <h3 id="mem2">Character #2</h3>
        <p>"b*tch".</p>
        <img class="Flambae border" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRLzlicniGI3Bx4OESzM_R3x2Uz6O7z2VunDA&s", width="500">
      </li>

      <li>
        <h3 id="mem3">Character #3</h3>
        <p>Hear me out...</p>
        <img class="Toxic border" src="https://static.wikia.nocookie.net/dispatch/images/d/d8/Toxic_%28normal%29.jpg/revision/latest/scale-to-width-down/268?cb=20251103213724" alt="toxic human form" width="500">
      </li>
    </ol>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
    <script>

      $(".Robert").hide();
      $(".Flambae").hide();
      $(".Toxic").hide();

      // ======================== Button #1
      $("#mem1-button").click(function () {
        $("#mem1").css("color", "blue");
        $("#mem1").text("Robert 🤖");
        $(".Flambae").hide(400);
        $(".Robert").show(400);
        $(".Toxic").hide(400);
      });

      // ======================== Button #2
      $("#mem2-button").click(function () {
        $("#mem2").css("color", "red");
        $("#mem2").text("Flambae 🔥");
        $(".Flambae").show(400);
        $(".Robert").hide(400);
        $(".Toxic").hide(400);
      });

      // ======================== Button #3
      $("#mem3-button").click(function () {
        $("#mem3").css("color", "green");
        $("#mem3").text("Toxic ☣️");
        $(".Toxic").show(400);
        $(".Robert").hide(400);
        $(".Flambae").hide(400);
       
      });

      // ===== title 
      $("title").text("Fav dispatch characters")
      
      $("h1").html("My top 3 dispatch characrers")


    </script>
    </center>
  </body>
</html>
